<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <style>
    /* =====================================
   RESET
===================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

/* =====================================
   BODY
===================================== */

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:
    linear-gradient(rgba(10,37,64,.72),
    rgba(10,37,64,.72)),
    url("img/Login Page.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* =====================================
   LOGO
===================================== */

.logo{
    position:fixed;
    top:28px;
    right:40px;
    z-index:100;
}

.logo img{
    width:170px;
    display:block;
}

/* =====================================
   CONTAINER
===================================== */

.container{
    width:100%;
    max-width:420px;
}

/* =====================================
   CARD
===================================== */

#resetFormSection,
.success-card{
    background:#ffffff;
    padding:35px;
    border-radius:18px;
    box-shadow:0 12px 35px rgba(0,0,0,.18);
    animation:fadeIn .5s ease;
}

/* =====================================
   ANIMATION
===================================== */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =====================================
   TITLE
===================================== */

#resetFormSection h1{
    font-size:32px;
    font-weight:600;
    color:#092A49;
    margin-bottom:25px;
}

/* =====================================
   FORM
===================================== */

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    font-size:14px;
    font-weight:600;
    color:#092A49;
    margin-bottom:8px;
}

/* =====================================
   INPUT BOX
===================================== */

.input-box{
    position:relative;
}

.input-box input{
    width:100%;
    height:48px;
    padding:0 50px 0 14px;

    border:1px solid #e3e3e3;
    border-radius:6px;

    background:#f7f7f7;
    color:#333;
    font-size:14px;

    transition:.3s;
}

.input-box input:focus{
    outline:none;
    border-color:#0796FE;
    background:#fff;
}

.input-box input::placeholder{
    color:#b6b6b6;
}

/* =====================================
   EYE ICON
===================================== */

.eye-icon{
    position:absolute;
    top:50%;
    right:15px;
    transform:translateY(-50%);
    width:20px;
    height:20px;
    cursor:pointer;
    color:#8a8a8a;
    display:flex;
    align-items:center;
    justify-content:center;
}

.eye-icon svg{
    width:18px;
    height:18px;
    display:block;
}

/* Hide browser password icons */

input[type="password"]::-ms-reveal,
input[type="password"]::-ms-clear{
    display:none;
}

input[type="password"]::-webkit-credentials-auto-fill-button{
    display:none !important;
}

/* =====================================
   ERROR
===================================== */

.error-message{
    color:red;
    font-size:13px;
    margin-bottom:15px;
    display:none;
}

/* =====================================
   BUTTON
===================================== */

.btn{
    width:100%;
    height:50px;

    border:none;
    border-radius:6px;

    background:#0796FE;
    color:#fff;

    font-size:15px;
    font-weight:600;

    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#056dc0;
}

/* =====================================
   SUCCESS CARD
===================================== */

.success-card{
    text-align:center;
}

.success-icon-container{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
}

.success-icon{
    width:90px;
    height:90px;
}

.success-card h2{
    font-size:28px;
    color:#092A49;
    margin-bottom:12px;
}

.success-card p{
    font-size:15px;
    color:#666;
    line-height:1.6;
}

/* =====================================
   SUCCESS ANIMATION
===================================== */

.success-rays line{
    opacity:0;
    animation:rayFade .7s ease forwards;
}

.success-checkmark-path{
    stroke-dasharray:70;
    stroke-dashoffset:70;
    animation:drawCheck .8s ease forwards;
}

@keyframes drawCheck{
    to{
        stroke-dashoffset:0;
    }
}

@keyframes rayFade{
    to{
        opacity:1;
    }
}
/* =====================================
   LARGE TABLETS
===================================== */

@media (max-width: 991px){

    .logo{
        top:20px;
        right:20px;
    }

    .logo img{
        width:140px;
    }

    .container{
        max-width:450px;
    }

    #resetFormSection,
    .success-card{
        padding:30px;
    }

    #resetFormSection h1{
        font-size:28px;
    }
}

/* =====================================
   TABLETS & LARGE MOBILES
===================================== */

@media (max-width: 768px){

    body{
        padding:20px;
    }

    .logo{
        position:absolute;
        top:15px;
        right:15px;
    }

    .logo img{
        width:120px;
    }

    .container{
        width:100%;
        max-width:500px;
        margin-top:40px;
    }

    #resetFormSection,
    .success-card{
        padding:28px;
    }

    #resetFormSection h1{
        font-size:26px;
    }
}

/* =====================================
   MOBILE DEVICES
===================================== */

@media (max-width: 576px){

    body{
        min-height:100vh;
        padding:15px;
        align-items:center;
    }

    .logo{
        position:absolute;
        top:12px;
        right:12px;
    }

    .logo img{
        width:100px;
    }

    .container{
        width:100%;
        max-width:100%;
        margin-top:35px;
    }

    #resetFormSection,
    .success-card{
        width:100%;
        padding:24px 20px;
        border-radius:14px;
    }

    #resetFormSection h1{
        font-size:24px;
        margin-bottom:20px;
    }

    .form-group{
        margin-bottom:15px;
    }

    .input-box input{
        height:50px;
        font-size:14px;
    }

    .btn{
        height:50px;
        font-size:15px;
    }

    .success-card h2{
        font-size:24px;
    }

    .success-card p{
        font-size:14px;
    }
}

/* =====================================
   SMALL MOBILES
===================================== */

@media (max-width: 375px){

    .logo img{
        width:90px;
    }

    #resetFormSection,
    .success-card{
        padding:20px 16px;
    }

    #resetFormSection h1{
        font-size:22px;
    }

    .input-box input{
        height:48px;
        font-size:13px;
    }

    .btn{
        height:48px;
        font-size:14px;
    }

    .success-icon{
        width:70px;
        height:70px;
    }

    .success-card h2{
        font-size:22px;
    }
}

/* =====================================
   EXTRA SMALL DEVICES
===================================== */

@media (max-width: 320px){

    body{
        padding:10px;
    }

    .logo img{
        width:80px;
    }

    #resetFormSection,
    .success-card{
        padding:18px 14px;
    }

    #resetFormSection h1{
        font-size:20px;
    }

    .input-box input{
        height:44px;
        font-size:12px;
        padding:0 42px 0 12px;
    }

    .btn{
        height:44px;
        font-size:13px;
    }
}

/* =====================================
   LANDSCAPE MOBILE FIX
===================================== */

@media screen and (max-height: 500px) and (orientation: landscape){

    body{
        display:block;
        min-height:auto;
        padding:15px;
        overflow-y:auto;
    }

    .logo{
        position:relative;
        top:auto;
        right:auto;
        text-align:right;
        margin-bottom:15px;
    }

    .logo img{
        width:110px;
        margin-left:auto;
    }

    .container{
        max-width:500px;
        margin:0 auto;
    }

    #resetFormSection,
    .success-card{
        padding:20px;
    }

    #resetFormSection h1{
        font-size:22px;
        margin-bottom:15px;
    }

    .form-group{
        margin-bottom:12px;
    }

    .input-box input{
        height:42px;
    }

    .btn{
        height:42px;
    }
}

  </style>
</head>
<body>
<div class="logo">
    <a href="index.html">
        <img src="img/creativesweb.png" alt="Creatives Web Logo">
    </a>
</div>
  <div class="container">
    <!-- Reset Form Section -->
    <div id="resetFormSection">
      <h1>Reset Password</h1>
      <form id="resetForm" onsubmit="handleReset(event)">
        <div class="form-group password-box">
          <label for="newPassword">New Password</label>
      
          <div class="input-box">
              <input type="password" id="newPassword" placeholder="Enter new password" required>
      
              <span class="eye-icon" onclick="togglePassword('newPassword', this)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
              </span>
          </div>
        </div>
      
        <div class="form-group password-box">
          <label for="confirmPassword">Confirm Password</label>
      
          <div class="input-box">
              <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
      
              <span class="eye-icon" onclick="togglePassword('confirmPassword', this)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
              </span>
          </div>
        </div>
        <div id="errorMsg" class="error-message"></div>
        <button type="submit" class="btn">
          Reset Password
        </button>
      </form>
    </div>
    <!-- Success Section -->
    <div id="successCard" class="success-card" style="display: none;">
      <div class="success-icon-container">
        <svg class="success-icon" viewBox="0 0 100 100">
          <!-- 12 Radiating Rays -->
          <g class="success-rays" stroke="#0796FE" stroke-width="3" stroke-linecap="round">
            <line x1="80" y1="50" x2="94" y2="50" />
            <line x1="76" y1="65" x2="88" y2="72" />
            <line x1="65" y1="76" x2="72" y2="88" />
            <line x1="50" y1="80" x2="50" y2="94" />
            <line x1="35" y1="76" x2="28" y2="88" />
            <line x1="24" y1="65" x2="12" y2="72" />
            <line x1="20" y1="50" x2="6" y2="50" />
            <line x1="24" y1="35" x2="12" y2="28" />
            <line x1="35" y1="24" x2="28" y2="12" />
            <line x1="50" y1="20" x2="50" y2="6" />
            <line x1="65" y1="24" x2="72" y2="12" />
            <line x1="76" y1="35" x2="88" y2="28" />
          </g>
          <!-- Center Checkmark -->
          <path class="success-checkmark-path" d="M 36 50 L 46 60 L 64 42" stroke="#0796FE" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        </svg>
      </div>
      <h2>Successfully Changed !</h2>
      <p>Your password has been successfully changed.</p>
    </div>
  </div>
  <script>
    const EYE_OPEN = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
    const EYE_SLASHED = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      
      if (input.type === "password") {
        input.type = "text";
        icon.innerHTML = EYE_OPEN;
      } else {
        input.type = "password";
        icon.innerHTML = EYE_SLASHED;
      }
    }
    function handleReset(event) {
      event.preventDefault();
      
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      
      // Reset error
      errorMsg.style.display = 'none';
      errorMsg.textContent = '';
      if (!newPassword || !confirmPassword) {
        errorMsg.textContent = "Please fill in all fields.";
        errorMsg.style.display = 'block';
        return;
      }
      if (newPassword !== confirmPassword) {
        errorMsg.textContent = "Passwords do not match.";
        errorMsg.style.display = 'block';
        return;
      }
      // Hide the form section
      document.getElementById('resetFormSection').style.display = 'none';
      
      // Display the success card
      document.getElementById('successCard').style.display = 'block';
    }
  </script>
</body>
</html>
