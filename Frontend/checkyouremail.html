<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check Your Email</title>


    <style>

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, Helvetica, sans-serif;
        }

        body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
        position:relative;

        background:url("img/Login\ Page.png") no-repeat center center/cover;
        }

        /* overlay */
        body::before{
        content:"";
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;

        z-index:0;
        }

        /* logo */
        .logo{
        position:absolute;
        top:30px;
        right:40px;
        z-index:2;
        }

        .logo img{
        width:200px;
        height:auto;
        }

        /* card */
        .card{
        background:white;
        padding:40px;
        width:100%;
        max-width:380px;
        border-radius:12px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        text-align:center;
        z-index:2;
        }

        /* icon */
        .icon{
        width:70px;
        height:70px;
        border-radius:50%;
        border:3px solid #1e88e5;
        display:flex;
        align-items:center;
        justify-content:center;
        margin:0 auto 15px auto;
        font-size:32px;
        color:#1e88e5;
        }

        .card h2{
        font-size:20px;
        margin-bottom:10px;
        }

        .card p{
        font-size:14px;
        color:#555;
        margin-bottom:10px;
        }

        .email{
        color:#1e88e5;
        font-weight:bold;
        word-break:break-all; /* FIX for long emails */
        }

        .try{
        margin-top:10px;
        font-size:13px;
        }

        .try a{
        color:#1e88e5;
        text-decoration:none;
        font-weight:bold;
        }

        /* MOBILE FIX */
        @media (max-width:768px){

        body{
        flex-direction:column;
        align-items:center;
        justify-content:center;
        }

        /* logo center */
        .logo{
        top:30px;
        right:40px;
        }

        .logo img{
        width:130px;
        }

        /* card spacing */
        .card{
        padding:25px;
        border-radius:10px;
        }

        /* text scaling */
        .card h2{
        font-size:18px;
        }

        .card p{
        font-size:13px;
        }

        .icon{
        width:60px;
        height:60px;
        font-size:26px;
        }

        }

    </style>


</head>
<body>

<div class="logo">
    <img src="img/creativesweb.png">
</div>

<div class="card">

    <div class="icon">?</div>

    <h2>Check Your Email !</h2>

    <p>We have sent a password reset link to your mail</p>

    <p class="email" id="userEmail"></p>

    <p class="try">
        Didn't receive mail ?
        <a href="forgot_password.html">Try again</a>
    </p>

</div>


<script>

    /* Get email from URL */
    const params = new URLSearchParams(window.location.search);
    const email = params.get("email");

    /* Show email safely */
    document.getElementById("userEmail").textContent = email || "your email";

</script>


</body>
</html>
